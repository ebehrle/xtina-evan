<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wedding Planner</title>
  <style>
    body {
      font-family: "Times New Roman", Times, serif;
      font-size: 15px;
      line-height: 1.6;
      max-width: 960px;
      margin: 40px auto;
      padding: 0 20px 80px;
      color: #111;
      background: #fff;
    }
    h1 { font-size: 1.6em; font-weight: normal; margin-bottom: 0.2em; }
    .toolbar { display: flex; align-items: center; gap: 16px; margin: 1.2em 0 2em; flex-wrap: wrap; }
    .toolbar button { font-family: "Times New Roman", Times, serif; font-size: 1em; background: none; border: 1px solid #111; padding: 4px 16px; cursor: pointer; color: #111; }
    .toolbar button:hover { background: #111; color: #fff; }
    .toolbar button:disabled { opacity: 0.4; cursor: default; }
    .toolbar button:disabled:hover { background: none; color: #111; }
    #status { font-style: italic; color: #888; font-size: 0.95em; }
    .board { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 32px 24px; }
    .section { border-top: 1px solid #111; padding-top: 0.6em; }
    .section-title { font-weight: bold; font-size: 1em; margin-bottom: 0.8em; }
    .columns { display: flex; gap: 12px; }
    .column { flex: 1; min-height: 80px; }
    .column-label { font-size: 0.85em; color: #888; margin-bottom: 0.4em; font-style: italic; }
    .drop-zone { min-height: 60px; padding: 6px; border: 1px dashed #ccc; background: #fafafa; }
    .drop-zone.drag-over { background: #f0f0f0; border-color: #999; }
    .card { background: #fff; border: 1px solid #aaa; padding: 6px 10px; margin-bottom: 6px; cursor: grab; font-size: 0.95em; user-select: none; }
    .card:active { cursor: grabbing; }
    .card.dragging { opacity: 0.4; }
    .card-header { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
    .card-label { user-select: none; }
    .card-price { font-size: 0.85em; color: #888; white-space: nowrap; flex-shrink: 0; }
    .suboptions { margin-top: 6px; padding-top: 6px; border-top: 1px solid #ddd; cursor: default; }
    .suboptions label { display: flex; justify-content: space-between; align-items: baseline; font-size: 0.9em; margin-bottom: 3px; cursor: pointer; user-select: none; }
    .suboptions input[type="radio"] { margin-right: 5px; cursor: pointer; flex-shrink: 0; }
    .suboption-price { font-size: 0.85em; color: #888; white-space: nowrap; margin-left: 8px; }
    .section-image { display: none; margin-top: 12px; width: 100%; }
    .section-image img { width: 100%; display: block; margin-bottom: 8px; }
    #setup { display: none; margin-top: 2em; }
    #setup p { margin-bottom: 0.8em; }
    #setup input { width: 100%; max-width: 480px; font-family: "Times New Roman", Times, serif; font-size: 1em; border: 1px solid #aaa; padding: 6px 8px; box-sizing: border-box; }
    #setup button { font-family: "Times New Roman", Times, serif; font-size: 1em; background: none; border: 1px solid #111; padding: 4px 16px; cursor: pointer; margin-top: 0.6em; }
    #setup button:hover { background: #111; color: #fff; }
    #main { display: none; }
    #totals { margin-top: 48px; border-top: 1px solid #111; padding-top: 0.8em; }
    #totals h2 { font-size: 1em; font-weight: bold; margin: 0 0 0.8em; }
    .totals-table { width: 100%; border-collapse: collapse; font-size: 0.95em; }
    .totals-table td { padding: 2px 0; vertical-align: top; }
    .totals-table td:last-child { text-align: right; white-space: nowrap; padding-left: 16px; }
    .totals-table .tbd { color: #999; }
    .totals-divider td { border-top: 1px solid #aaa; padding-top: 6px; padding-bottom: 0; }
    .totals-total td { font-weight: bold; }
    .totals-note { font-size: 0.85em; color: #999; font-style: italic; margin-top: 0.6em; }
    .totals-empty { color: #999; font-style: italic; font-size: 0.95em; }
  </style>
</head>
<body>

  <h1>Wedding Planner</h1>

  <div id="setup">
    <p>Enter your GitHub personal access token to get started. It will be saved in your browser and never stored in the code.</p>
    <input type="password" id="token-input" placeholder="ghp_..." />
    <br />
    <button id="token-save">Connect</button>
    <p id="token-error" style="color:#c00; display:none;">Could not connect. Check your token and try again.</p>
  </div>

  <div id="main">
    <div class="toolbar">
      <button id="save-btn">Save</button>
      <button id="reset-token-btn" style="border-color:#aaa; color:#888;">Reset token</button>
      <span id="status"></span>
    </div>
    <div class="board" id="board"></div>
    <div id="totals"></div>
  </div>

  <script>
    const REPO = 'ebehrle/xtina-evan';
    const FILE = 'planning-state.json';
    const API  = `https://api.github.com/repos/${REPO}/contents/${FILE}`;

    const SECTIONS = [
      { id: 'rehearsal', title: 'Rehearsal Dinner',
        cards: ['None', 'Picnic', 'Small party reservation', 'Medium party reservation', 'Large buyout'] },
      { id: 'welcome', title: 'Welcome Drinks',
        cards: ['None', 'Reserve space', 'Reserve space + tab', 'Part of dinner restaurant buyout'] },
      { id: 'ceremony', title: 'Ceremony',
        cards: ['None', 'Courthouse', 'Park', 'Separate space', 'Reception space'] },
      { id: 'reception', title: 'Reception',
        cards: ['Boathouse', 'Borgo', 'Golden Unicorn'] },
      { id: 'afterparty', title: 'Afterparty',
        cards: ['[Options to be decided]'] }
    ];

    const SUBOPTIONS = {
      rehearsal: {
        'Picnic':                      ['Prospect Park', 'Central Park'],
        'Small party reservation':     ['Fausto', 'Long Island Bar', 'LaRina'],
        'Medium party reservation':    ['Fausto', 'Long Island Bar', 'LaRina'],
        'Large buyout':                ['Long Island Bar', 'LaRina']
      },
      welcome: {
        'Reserve space':                    ['Doris', "Fong's", 'The Gate', 'Washington Commons', 'Anable Basin', 'Funny Bar', 'Gottscheer Hall', 'Ainslie Bowery', 'Ainslie Brooklyn'],
        'Reserve space + tab':              ['Doris', "Fong's", 'The Gate', 'Washington Commons', 'Anable Basin', 'Funny Bar', 'Gottscheer Hall', 'Ainslie Bowery', 'Ainslie Brooklyn'],
        'Part of dinner restaurant buyout': ['Long Island Bar', 'LaRina']
      },
      ceremony: {
        'Park':           ['Seward'],
        'Separate space': ['Angel Orensanz', 'Museum at Eldridge Street']
      }
    };

    const CARD_PRICES = {
      reception: {
        'Borgo':          76938,
        'Golden Unicorn': 36544,
        'Boathouse':      73426
      }
    };

    const SUBOPTION_PRICES = {
      rehearsal: {
        'Small party reservation': {
          'Fausto':          2000,
          'Long Island Bar': 2000,
          'LaRina':          2000
        },
        'Medium party reservation': {
          'Fausto':          5000,
          'Long Island Bar': 5000,
          'LaRina':          5000
        },
        'Large buyout': {
          'LaRina':          11000,
          'Long Island Bar': 'reception_dependent'
        }
      }
    };

    // Images for chosen cards without suboptions: { sectionId: { cardName: url } }
    const CARD_IMAGES = {
      reception: {
        'Boathouse':      ['Photos/boathouse.jpeg'],
        'Borgo':          ['Photos/borgo.jpeg'],
        'Golden Unicorn': ['Photos/golden unicorn.jpeg']
      }
    };

    // Images for selected suboptions: { sectionId: { cardName: { suboptionName: url } } }
    const SUBOPTION_IMAGES = {
      ceremony: {
        'Separate space': {
          'Angel Orensanz':          ['Photos/angel orensanz.avif'],
          'Museum at Eldridge Street':['Photos/museum at eldridge street.webp']
        }
      },
      welcome: {
        'Reserve space': {
          'Doris':             ['Photos/doris.jpeg', 'Photos/doris 2.jpeg'],
          "Fong's":            ['Photos/fongs.jpg'],
          'The Gate':          ['Photos/gate.avif', 'Photos/gate 2.jpg'],
          'Washington Commons':['Photos/washington commons.jpg'],
          'Anable Basin':      ['Photos/anable basin.jpg']
        },
        'Reserve space + tab': {
          'Doris':             ['Photos/doris.jpeg', 'Photos/doris 2.jpeg'],
          "Fong's":            ['Photos/fongs.jpg'],
          'The Gate':          ['Photos/gate.avif', 'Photos/gate 2.jpg'],
          'Washington Commons':['Photos/washington commons.jpg'],
          'Anable Basin':      ['Photos/anable basin.jpg']
        }
      }
    };

    function getCardPrice(sectionId, cardName) {
      const sec = CARD_PRICES[sectionId];
      if (!sec || !(cardName in sec)) return null;
      return sec[cardName];
    }

    function getSuboptionPrice(sectionId, cardName, suboptionName) {
      const card = SUBOPTION_PRICES[sectionId] && SUBOPTION_PRICES[sectionId][cardName];
      if (!card || !(suboptionName in card)) return null;
      const val = card[suboptionName];
      if (val === 'reception_dependent') {
        const rec = state.reception ? state.reception.chosen[0] : null;
        if (rec === 'Borgo' || rec === 'Golden Unicorn') return 32719;
        if (rec === 'Boathouse') return 23558;
        return 'reception_dependent';
      }
      return val;
    }

    function formatPrice(p) {
      if (p === null) return 'TBD';
      if (p === 'reception_dependent') return '$23,558 or $32,719';
      return '$' + p.toLocaleString();
    }

    let token = localStorage.getItem('gh_token') || '';
    let fileSha = null;
    let state = {};

    function initState() {
      const s = {};
      SECTIONS.forEach(sec => {
        s[sec.id] = { options: [...sec.cards], chosen: [], suboptions: {} };
      });
      return s;
    }

    function applyState(loaded) {
      SECTIONS.forEach(sec => {
        if (!loaded[sec.id]) {
          state[sec.id] = { options: [...sec.cards], chosen: [], suboptions: {} };
        } else {
          state[sec.id] = loaded[sec.id];
          if (!state[sec.id].suboptions) state[sec.id].suboptions = {};
          sec.cards.forEach(card => {
            const inOptions = state[sec.id].options.includes(card);
            const inChosen  = state[sec.id].chosen.includes(card);
            if (!inOptions && !inChosen) state[sec.id].options.push(card);
          });
        }
      });
    }

    async function loadFromGitHub() {
      const res = await fetch(API, {
        headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github+json' }
      });
      if (res.status === 404) { state = initState(); return true; }
      if (!res.ok) return false;
      const data = await res.json();
      fileSha = data.sha;
      const decoded = JSON.parse(atob(data.content));
      state = initState();
      applyState(decoded);
      return true;
    }

    async function saveToGitHub() {
      setStatus('Saving...');
      document.getElementById('save-btn').disabled = true;
      const content = btoa(unescape(encodeURIComponent(JSON.stringify(state, null, 2))));
      const body = { message: 'Update planning board', content, ...(fileSha ? { sha: fileSha } : {}) };
      const res = await fetch(API, {
        method: 'PUT',
        headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      document.getElementById('save-btn').disabled = false;
      if (!res.ok) { setStatus('Error saving. Try again.'); return; }
      const data = await res.json();
      fileSha = data.content.sha;
      setStatus('Saved.');
      setTimeout(() => setStatus(''), 3000);
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    // ── Images ─────────────────────────────────────────────────────────────────

    function updateSectionImages() {
      SECTIONS.forEach(sec => {
        const imgDiv = document.querySelector(`[data-section-img="${sec.id}"]`);
        if (!imgDiv) return;
        const secState = state[sec.id];
        const chosenCard = secState.chosen[0] || null;
        const selectedSub = chosenCard ? (secState.suboptions[chosenCard] || null) : null;

        const urls =
          (selectedSub &&
           SUBOPTION_IMAGES[sec.id] &&
           SUBOPTION_IMAGES[sec.id][chosenCard] &&
           SUBOPTION_IMAGES[sec.id][chosenCard][selectedSub]) ||
          (!selectedSub && chosenCard &&
           CARD_IMAGES[sec.id] &&
           CARD_IMAGES[sec.id][chosenCard]) || null;

        if (urls && urls.length) {
          const alt = selectedSub || chosenCard;
          imgDiv.innerHTML = urls.map(function(u) { return '<img src="' + u + '" alt="' + alt + '" />'; }).join('');
          imgDiv.style.display = 'block';
        } else {
          imgDiv.innerHTML = '';
          imgDiv.style.display = 'none';
        }
      });
    }

    // ── Totals ─────────────────────────────────────────────────────────────────

    function renderTotals() {
      const el = document.getElementById('totals');
      const rows = [];
      let total = 0;
      let hasTbd = false;

      SECTIONS.forEach(sec => {
        const secState = state[sec.id];
        if (!secState || secState.chosen.length === 0) return;
        secState.chosen.forEach(card => {
          const selectedSub = secState.suboptions[card] || null;
          const cardPrice = getCardPrice(sec.id, card);
          const subPrice  = selectedSub ? getSuboptionPrice(sec.id, card, selectedSub) : null;
          const hasSuboptions = SUBOPTIONS[sec.id] && SUBOPTIONS[sec.id][card];

          let displayLabel = sec.title + ': ' + card;
          if (selectedSub) displayLabel += ' → ' + selectedSub;

          let priceToShow = null;
          if (hasSuboptions) {
            if (selectedSub) {
              priceToShow = subPrice;
              if (typeof priceToShow === 'number') total += priceToShow;
              else hasTbd = true;
            }
          } else {
            priceToShow = cardPrice;
            if (typeof priceToShow === 'number') total += priceToShow;
            else if (priceToShow === null) hasTbd = true;
          }

          if (priceToShow !== null || hasSuboptions) {
            rows.push({ label: displayLabel, price: priceToShow, tbd: priceToShow === null || priceToShow === 'reception_dependent' });
          }
        });
      });

      if (rows.length === 0) {
        el.innerHTML = '<h2>Estimated total</h2><p class="totals-empty">No options chosen yet.</p>';
        return;
      }

      let html = '<h2>Estimated total</h2><table class="totals-table">';
      rows.forEach(row => {
        html += `<tr class="${row.tbd ? 'tbd' : ''}"><td>${row.label}</td><td>${row.price !== null ? formatPrice(row.price) : 'TBD'}</td></tr>`;
      });
      html += `<tr class="totals-divider totals-total"><td>Total</td><td>$${total.toLocaleString()}</td></tr>`;
      html += `<tr class="totals-total"><td>All-in (planning fee + all other costs)</td><td>$${(total + 48100).toLocaleString()}</td></tr>`;
      html += '</table>';
      if (hasTbd) html += '<p class="totals-note">Items marked TBD are not included in the total.</p>';
      el.innerHTML = html;
    }

    // ── Rendering ──────────────────────────────────────────────────────────────

    function renderBoard() {
      const board = document.getElementById('board');
      board.innerHTML = '';
      SECTIONS.forEach(sec => {
        const secState = state[sec.id];
        const div = document.createElement('div');
        div.className = 'section';
        div.innerHTML = `
          <div class="section-title">${sec.title}</div>
          <div class="columns">
            <div class="column">
              <div class="column-label">Options</div>
              <div class="drop-zone" data-section="${sec.id}" data-col="options"></div>
            </div>
            <div class="column">
              <div class="column-label">Chosen</div>
              <div class="drop-zone" data-section="${sec.id}" data-col="chosen"></div>
            </div>
          </div>
          <div class="section-image" data-section-img="${sec.id}"></div>`;
        board.appendChild(div);

        ['options', 'chosen'].forEach(col => {
          const zone = div.querySelector(`[data-col="${col}"]`);
          const cards = col === 'options'
            ? [...secState[col]].sort((a, b) => sec.cards.indexOf(a) - sec.cards.indexOf(b))
            : secState[col];
          cards.forEach(card => {
            const isChosen = col === 'chosen';
            const opts = isChosen && SUBOPTIONS[sec.id] && SUBOPTIONS[sec.id][card]
              ? SUBOPTIONS[sec.id][card] : null;
            const selected = isChosen ? (secState.suboptions[card] || '') : '';
            zone.appendChild(makeCard(card, sec.id, opts, selected));
          });
          addDropZoneListeners(zone);
        });
      });

      renderTotals();
      updateSectionImages();
    }

    function makeCard(text, sectionId, suboptions, selectedSuboption) {
      const div = document.createElement('div');
      div.className = 'card';
      div.draggable = true;
      div.addEventListener('dragstart', onDragStart);
      div.addEventListener('dragend', onDragEnd);

      const header = document.createElement('div');
      header.className = 'card-header';

      const label = document.createElement('div');
      label.className = 'card-label';
      label.textContent = text;
      header.appendChild(label);

      const hasSuboptionsDefined = !!(SUBOPTIONS[sectionId] && SUBOPTIONS[sectionId][text]);
      if (!hasSuboptionsDefined) {
        const cardPrice = (text === 'None' || text === 'Reception space') ? 0 : getCardPrice(sectionId, text);
        const priceEl = document.createElement('div');
        priceEl.className = 'card-price';
        priceEl.textContent = cardPrice !== null ? formatPrice(cardPrice) : 'TBD';
        header.appendChild(priceEl);
      }
      div.appendChild(header);

      const hasSuboptions = suboptions && suboptions.length > 0;
      if (hasSuboptions) {
        const subDiv = document.createElement('div');
        subDiv.className = 'suboptions';
        subDiv.addEventListener('mousedown', e => e.stopPropagation());
        suboptions.forEach(opt => {
          const safeId   = `sub_${sectionId}_${text}_${opt}`.replace(/[^a-zA-Z0-9]/g, '_');
          const safeName = `sub_${sectionId}_${text}`.replace(/[^a-zA-Z0-9]/g, '_');
          const lbl = document.createElement('label');
          lbl.htmlFor = safeId;
          const radio = document.createElement('input');
          radio.type = 'radio';
          radio.id = safeId;
          radio.name = safeName;
          radio.value = opt;
          if (opt === selectedSuboption) radio.checked = true;
          radio.addEventListener('change', () => {
            state[sectionId].suboptions[text] = opt;
            renderTotals();
            updateSectionImages();
          });
          const textSpan = document.createElement('span');
          textSpan.textContent = opt;
          const priceSpan = document.createElement('span');
          priceSpan.className = 'suboption-price';
          priceSpan.textContent = formatPrice(getSuboptionPrice(sectionId, text, opt));
          lbl.appendChild(radio);
          lbl.appendChild(textSpan);
          lbl.appendChild(priceSpan);
          subDiv.appendChild(lbl);
        });
        div.appendChild(subDiv);
      }

      return div;
    }

    // ── Drag & Drop ────────────────────────────────────────────────────────────

    let dragging = null;

    function onDragStart(e) {
      dragging = e.currentTarget;
      e.currentTarget.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', e.currentTarget.querySelector('.card-label').textContent);
    }

    function onDragEnd(e) {
      e.currentTarget.classList.remove('dragging');
      dragging = null;
      document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('drag-over'));
    }

    function addDropZoneListeners(zone) {
      zone.addEventListener('dragover', e => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        zone.classList.add('drag-over');
      });
      zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
      zone.addEventListener('drop', e => {
        e.preventDefault();
        zone.classList.remove('drag-over');
        if (!dragging) return;
        const cardText = dragging.querySelector('.card-label').textContent;
        const toSection = zone.dataset.section;
        const toCol = zone.dataset.col;
        const fromZone = dragging.closest('.drop-zone');
        const fromSection = fromZone.dataset.section;
        const fromCol = fromZone.dataset.col;

        state[fromSection][fromCol] = state[fromSection][fromCol].filter(c => c !== cardText);
        if (fromCol === 'chosen' && toCol !== 'chosen') {
          delete state[fromSection].suboptions[cardText];
        }
        if (toCol === 'chosen') {
          state[toSection].chosen.forEach(existing => {
            if (existing !== cardText) {
              state[toSection].options.push(existing);
              delete state[toSection].suboptions[existing];
            }
          });
          state[toSection].chosen = [];
        }
        if (!state[toSection][toCol].includes(cardText)) {
          state[toSection][toCol].push(cardText);
        }
        renderBoard();
      });
    }

    // ── Auth ───────────────────────────────────────────────────────────────────

    async function connect(t) {
      token = t;
      const ok = await loadFromGitHub();
      if (!ok) return false;
      localStorage.setItem('gh_token', token);
      return true;
    }

    async function init() {
      if (token) {
        setStatus('Loading...');
        document.getElementById('main').style.display = 'block';
        const ok = await loadFromGitHub();
        if (ok) { renderBoard(); setStatus(''); }
        else {
          token = '';
          localStorage.removeItem('gh_token');
          document.getElementById('main').style.display = 'none';
          document.getElementById('setup').style.display = 'block';
        }
      } else {
        document.getElementById('setup').style.display = 'block';
      }
    }

    document.getElementById('token-save').addEventListener('click', async () => {
      const t = document.getElementById('token-input').value.trim();
      if (!t) return;
      document.getElementById('token-error').style.display = 'none';
      document.getElementById('token-save').disabled = true;
      const ok = await connect(t);
      document.getElementById('token-save').disabled = false;
      if (ok) {
        document.getElementById('setup').style.display = 'none';
        document.getElementById('main').style.display = 'block';
        renderBoard();
      } else {
        document.getElementById('token-error').style.display = 'block';
      }
    });

    document.getElementById('save-btn').addEventListener('click', saveToGitHub);

    document.getElementById('reset-token-btn').addEventListener('click', () => {
      localStorage.removeItem('gh_token');
      token = '';
      document.getElementById('main').style.display = 'none';
      document.getElementById('setup').style.display = 'block';
    });

    init();
  </script>

</body>
</html>
